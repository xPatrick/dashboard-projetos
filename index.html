<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Completo FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f3f4f6;padding:20px}
input,select,button{padding:6px;margin:3px}
.table{width:100%;background:#fff;border-collapse:collapse}
.table td,.table th{border:1px solid #ddd;padding:6px;text-align:center}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.box{background:#fff;padding:20px;border-radius:8px;width:900px;max-height:90vh;overflow:auto}
</style>
</head>

<body>

<h2>Login</h2>
<input id="email"><input id="senha" type="password">
<button onclick="login()">Entrar</button>
<button onclick="logout()">Sair</button>

<hr>

<h2>Cadastro Completo</h2>
<input id="edital" placeholder="EDITAL">
<input id="sei_exec" placeholder="SEI - EXECUÇÃO">
<input id="sei_pc" placeholder="SEI - PRESTAÇÃO">
<input id="proposta" placeholder="N° PROPOSTA">
<input id="projeto" placeholder="PROJETO">
<input id="proponente" placeholder="PROPONENTE">
<input type="date" id="vig_ini">
<input type="date" id="vig_fim">
<select id="situacao">
<option>Ativo</option>
<option>Pendente</option>
<option>Finalizado</option>
</select>
<textarea id="obs" placeholder="OBSERVAÇÕES"></textarea>
<button onclick="salvarProjeto()">Salvar</button>

<hr>

<h2>Projetos</h2>
<table class="table">
<thead>
<tr>
<th>ID</th><th>EDITAL</th><th>EXEC</th><th>PC</th><th>PROPOSTA</th>
<th>PROJETO</th><th>PROPONENTE</th><th>VIG INI</th><th>VIG FIM</th>
<th>SITUAÇÃO</th><th>OBS</th><th>AÇÕES</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<!-- MODAL PARCELAS -->
<div id="modal" class="modal">
<div class="box">
<h3>Parcelas</h3>

<label>VALOR</label><input id="p_valor">
<label>DATA PC</label><input type="date" id="p_data">
<label>TÉCNICO</label><input id="p_tecnico">
<label>ANALISTA</label><input id="p_analista">

<button onclick="salvarParcela()">Salvar Parcela</button>

<table class="table">
<thead>
<tr>
<th>PARCELA</th><th>VALOR</th><th>DATA</th><th>TÉCNICO</th><th>ANALISTA</th><th>AÇÕES</th>
</tr>
</thead>
<tbody id="listaParcelas"></tbody>
</table>

<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script>
const SUPABASE_URL='https://xpatrick.github.io/dashboard-projetos/';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbmJ3c3VkZXRvenB3a21tYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjYyOTMsImV4cCI6MjA5MDU0MjI5M30.n6RKpFASm6PRTdXRWnp6S_D_o-Ivaou4ljq3O_Khyqk';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let projetoAtual=null;
let parcelaEditId=null;

async function login(){
 await db.auth.signInWithPassword({email:email.value,password:senha.value});
 carregar();
}

async function logout(){
 await db.auth.signOut();
 location.reload();
}

async function salvarProjeto(){
 await db.from('projetos').insert([{
 edital:edital.value,
 sei_exec:sei_exec.value,
 sei_pc:sei_pc.value,
 proposta:proposta.value,
 projeto:projeto.value,
 proponente:proponente.value,
 vig_ini:vig_ini.value,
 vig_fim:vig_fim.value,
 situacao:situacao.value,
 observacoes:obs.value
 }]);
 carregar();
}

async function carregar(){
 const {data}=await db.from('projetos').select('*');
 tabela.innerHTML='';
 data.forEach(p=>{
 let tr=document.createElement('tr');
 tr.innerHTML=`
 <td>${p.id}</td>
 <td>${p.edital}</td>
 <td>${p.sei_exec}</td>
 <td>${p.sei_pc}</td>
 <td>${p.proposta}</td>
 <td>${p.projeto}</td>
 <td>${p.proponente}</td>
 <td>${p.vig_ini}</td>
 <td>${p.vig_fim}</td>
 <td>${p.situacao}</td>
 <td>${p.observacoes}</td>
 <td><button onclick="abrirParcelas(${p.id})">Parcelas</button></td>`;
 tabela.appendChild(tr);
 });
}

function abrirParcelas(id){
 projetoAtual=id;
 modal.classList.add('show');
 carregarParcelas();
}

function fecharModal(){modal.classList.remove('show');}

async function salvarParcela(){
 const {data}=await db.from('parcelas').select('*').eq('projeto_id',projetoAtual);
 let numero=data.length+1;
 if(parcelaEditId){
 await db.from('parcelas').update({valor:p_valor.value,data_pc:p_data.value,tecnico:p_tecnico.value,analista:p_analista.value}).eq('id',parcelaEditId);
 parcelaEditId=null;
 }else{
 await db.from('parcelas').insert([{projeto_id:projetoAtual,numero,valor:p_valor.value,data_pc:p_data.value,tecnico:p_tecnico.value,analista:p_analista.value}]);
 }
 limpar();
 carregarParcelas();
}

async function carregarParcelas(){
 const {data}=await db.from('parcelas').select('*').eq('projeto_id',projetoAtual).order('numero');
 listaParcelas.innerHTML='';
 data.forEach(p=>{
 let tr=document.createElement('tr');
 tr.innerHTML=`
 <td>${p.numero}</td>
 <td>${p.valor}</td>
 <td>${p.data_pc}</td>
 <td>${p.tecnico}</td>
 <td>${p.analista}</td>
 <td>
 <button onclick="editarParcela(${p.id},'${p.valor}','${p.data_pc}','${p.tecnico}','${p.analista}')">✏️</button>
 <button onclick="excluirParcela(${p.id})">🗑️</button>
 </td>`;
 listaParcelas.appendChild(tr);
 });
}

function editarParcela(id,v,d,t,a){
 parcelaEditId=id;
 p_valor.value=v;
 p_data.value=d;
 p_tecnico.value=t;
 p_analista.value=a;
}

async function excluirParcela(id){
 await db.from('parcelas').delete().eq('id',id);
 carregarParcelas();
}

function limpar(){
 p_valor.value='';p_data.value='';p_tecnico.value='';p_analista.value='';
}

</script>

</body>
</html>
