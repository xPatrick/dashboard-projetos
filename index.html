<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema com Gestão de Usuários</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f3f4f6;padding:20px}
input,select,button{padding:6px;margin:3px}
.card{background:#fff;padding:10px;border-radius:8px;margin:5px}
.table{width:100%;background:#fff;border-collapse:collapse}
.table td,.table th{border:1px solid #ddd;padding:6px;text-align:center}
.hidden{display:none}
</style>
</head>

<body>

<h2>Login</h2>
<input id="email"><input id="senha" type="password">
<button onclick="login()">Entrar</button>
<button onclick="logout()">Sair</button>

<hr>

<h2 id="tituloAdmin" class="hidden">Gestão de Usuários</h2>
<table id="tabelaUsuarios" class="table hidden">
<thead>
<tr><th>Email</th><th>Perfil</th><th>Ação</th></tr>
</thead>
<tbody id="listaUsuarios"></tbody>
</table>

<hr>

<h2>Projetos</h2>
<div id="conteudo"></div>

<script>

const SUPABASE_URL = 'SUA_URL';
const SUPABASE_KEY = 'SUA_ANON_KEY';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentRole = 'user';

// LOGIN
async function login(){
 const { data, error } = await db.auth.signInWithPassword({
  email: email.value,
  password: senha.value
 });

 if(error){ alert(error.message); return; }

 currentUser = data.user;
 await carregarPerfil();
 carregar();
}

async function logout(){
 await db.auth.signOut();
 location.reload();
}

// PERFIL
async function carregarPerfil(){
 const { data } = await db
  .from('perfis')
  .select('role')
  .eq('id', currentUser.id)
  .single();

 currentRole = data?.role || 'user';

 if(currentRole === 'admin'){
  document.getElementById('tituloAdmin').classList.remove('hidden');
  document.getElementById('tabelaUsuarios').classList.remove('hidden');
  carregarUsuarios();
 }
}

// LISTAR USUÁRIOS (ADMIN)
async function carregarUsuarios(){

 const { data: perfis } = await db.from('perfis').select('*');
 const { data: users } = await db.auth.admin.listUsers();

 listaUsuarios.innerHTML='';

 users.users.forEach(u=>{
  const perfil = perfis.find(p=>p.id === u.id);

  let tr = document.createElement('tr');

  tr.innerHTML = `
    <td>${u.email}</td>
    <td>${perfil?.role || 'user'}</td>
    <td>
      <button onclick="alterarRole('${u.id}','admin')">Admin</button>
      <button onclick="alterarRole('${u.id}','user')">User</button>
    </td>`;

  listaUsuarios.appendChild(tr);
 });
}

// ALTERAR PERFIL
async function alterarRole(userId, role){
 await db.from('perfis').update({ role }).eq('id', userId);
 carregarUsuarios();
}

// CARREGAR DADOS
async function carregar(){
 const { data } = await db.from('projetos').select('*');
 conteudo.innerHTML = JSON.stringify(data);
}

</script>

</body>
</html>
