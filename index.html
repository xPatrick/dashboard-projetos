<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema com Supabase</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f3f4f6;padding:20px}
input,button{padding:6px;margin:3px}
.card{background:#fff;padding:10px;border-radius:8px;margin:5px}
.negativo{background:#fecaca}
.alerta{background:#fef9c3}
</style>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="email">
<input id="senha" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>

<hr>

<h2>Cadastro de Projeto</h2>

<input id="projeto" placeholder="Projeto">
<input id="proponente" placeholder="Proponente">
<input id="valor" placeholder="Valor">
<button onclick="salvarProjeto()">Salvar</button>

<hr>

<h2>Dashboard</h2>

<div class="card">Total Projetos: <span id="totalProj"></span></div>
<div class="card">Valor Total: <span id="totalValor"></span></div>
<div class="card">Executado: <span id="totalExec"></span></div>

<canvas id="graficoBar"></canvas>
<canvas id="graficoPie"></canvas>

<hr>

<h2>Lista</h2>
<div id="lista"></div>

<script>

// 🔐 CONFIG
const SUPABASE_URL = 'https://tanbwsudetozpwkmmbxy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AwgTyNI9gMQ-VAj7RTpSYw_0CQbLuhx';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 LOGIN
async function login(){
 const { error } = await client.auth.signInWithPassword({
   email: document.getElementById('email').value,
   password: document.getElementById('senha').value
 });

 if(error) alert(error.message);
 else{
   alert('Logado!');
   carregar();
 }
}

// 💾 SALVAR PROJETO
async function salvarProjeto(){
 await client.from('projetos').insert([{
   projeto: projeto.value,
   proponente: proponente.value,
   valor: parseFloat(valor.value)
 }]);

 carregar();
}

// 📥 CARREGAR DADOS
async function carregar(){

 const { data: projetos } = await client.from('projetos').select('*');
 const { data: parcelas } = await client.from('parcelas').select('*');

 let totalValor = 0;
 let totalExec = 0;

 document.getElementById('lista').innerHTML = '';

 projetos.forEach(p => {

   let exec = 0;

   parcelas
     .filter(x=>x.projeto_id===p.id)
     .forEach(parc=>{
       exec += parc.valor;
       totalExec += parc.valor;
     });

   totalValor += p.valor;

   let saldo = p.valor - exec;

   let div = document.createElement('div');
   div.className='card';

   if(saldo < 0) div.classList.add('negativo');
   else if(saldo < p.valor*0.2) div.classList.add('alerta');

   div.innerHTML = `
     <b>${p.projeto}</b><br>
     Valor: ${p.valor}<br>
     Executado: ${exec}<br>
     Saldo: ${saldo}
   `;

   document.getElementById('lista').appendChild(div);

 });

 document.getElementById('totalProj').innerText = projetos.length;
 document.getElementById('totalValor').innerText = totalValor.toFixed(2);
 document.getElementById('totalExec').innerText = totalExec.toFixed(2);

 gerarGraficos(totalValor, totalExec);
}

// 📊 GRÁFICOS
let bar,pie;

function gerarGraficos(total, exec){

 if(bar) bar.destroy();
 if(pie) pie.destroy();

 let saldo = total - exec;

 bar = new Chart(document.getElementById('graficoBar'),{
   type:'bar',
   data:{
     labels:['Total','Executado','Saldo'],
     datasets:[{data:[total,exec,saldo]}]
   }
 });

 pie = new Chart(document.getElementById('graficoPie'),{
   type:'pie',
   data:{
     labels:['Executado','Saldo'],
     datasets:[{data:[exec,saldo]}]
   }
 });
}

</script>

</body>
</html>
