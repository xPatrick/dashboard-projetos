<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema com Dashboard + Gráficos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-size:12px}
.card{background:#fff;border-radius:8px;padding:10px;text-align:center;box-shadow:0 2px 4px rgba(0,0,0,.1)}
</style>
</head>
<body class="bg-gray-100 p-4">

<h1 class="text-xl font-bold text-center mb-4">Dashboard com Gráficos</h1>

<!-- DASHBOARD -->
<div class="grid grid-cols-4 gap-3 mb-4">
<div class="card"><div>Total Projetos</div><div id="d_totalProj" class="text-lg font-bold"></div></div>
<div class="card"><div>Valor Total</div><div id="d_totalValor" class="text-lg font-bold"></div></div>
<div class="card"><div>Total Executado</div><div id="d_totalExec" class="text-lg font-bold"></div></div>
<div class="card"><div>% Execução</div><div id="d_percent" class="text-lg font-bold"></div></div>
</div>

<!-- BOTÃO EXIBIR GRÁFICOS -->
<div class="text-center mb-4">
<button onclick="toggleGraficos()" class="bg-indigo-600 text-white px-4 py-2">Mostrar / Ocultar Gráficos</button>
</div>

<!-- GRÁFICOS -->
<div id="areaGraficos" class="hidden grid grid-cols-2 gap-4 mb-4">
  <canvas id="graficoBarra"></canvas>
  <canvas id="graficoPizza"></canvas>
</div>

<script>
(function(){
'use strict';

let dados = JSON.parse(localStorage.getItem('dados') || '[]');
let dadosFiltrados = [...dados];
let chartBar, chartPie;

function parseValor(v){return Number((v||'').replace(/[^\d,]/g,'').replace(',','.'))||0}

function atualizarDashboard(){
let totalProj = dadosFiltrados.length;
let totalValor = 0;
let totalExec = 0;

dadosFiltrados.forEach(d=>{
 totalValor += parseValor(d.valor);
 (d.parcelas||[]).forEach(p=> totalExec += parseValor(p.v));
});

let percent = totalValor ? ((totalExec/totalValor)*100).toFixed(1) : 0;

// atualizar cards
 document.getElementById('d_totalProj').textContent = totalProj;
 document.getElementById('d_totalValor').textContent = totalValor.toFixed(2);
 document.getElementById('d_totalExec').textContent = totalExec.toFixed(2);
 document.getElementById('d_percent').textContent = percent + '%';

renderGraficos(totalValor, totalExec);
}

function renderGraficos(totalValor, totalExec){
let saldo = totalValor - totalExec;

// DESTROI gráficos anteriores (evita bug)
if(chartBar) chartBar.destroy();
if(chartPie) chartPie.destroy();

// GRÁFICO DE BARRA
chartBar = new Chart(document.getElementById('graficoBarra'),{
 type:'bar',
 data:{
  labels:['Total','Executado','Saldo'],
  datasets:[{
    label:'Valores',
    data:[totalValor,totalExec,saldo]
  }]
 }
});

// GRÁFICO DE PIZZA
chartPie = new Chart(document.getElementById('graficoPizza'),{
 type:'pie',
 data:{
  labels:['Executado','Saldo'],
  datasets:[{
    data:[totalExec,saldo]
  }]
 }
});
}

window.toggleGraficos = function(){
const el = document.getElementById('areaGraficos');
el.classList.toggle('hidden');
atualizarDashboard();
}

// inicial
atualizarDashboard();

})();
</script>

</body>
</html>
